# ── logstash.conf ─────────────────────────────────────────────────────────────
# Logstash pipeline for the notes-app.
#
# A Logstash pipeline has three stages:
#
#   INPUT  → where do logs come from?      (Filebeat via Beats protocol)
#   FILTER → how do we transform them?     (parse JSON, rename fields, etc.)
#   OUTPUT → where do processed logs go?   (Elasticsearch)
#
# Data flow:
#   Filebeat → [Beats :5045] → Logstash → Elasticsearch (notes-app-YYYY.MM.dd)
# ─────────────────────────────────────────────────────────────────────────────

# ── INPUT ─────────────────────────────────────────────────────────────────────
input {
  beats {
    # Listen for incoming Beats connections on port 5045.
    # Filebeat connects here to deliver log events.
    # 5045 is used instead of the default 5044 to avoid conflict
    # with demo-app's Logstash which listens on 5044.
    port => 5045
  }
}

# ── FILTER ────────────────────────────────────────────────────────────────────
filter {

  # ── Step 1: Parse the log message as JSON ────────────────────────────────
  # Our Flask app emits structured JSON logs, e.g.:
  #   {"timestamp": "2026-03-28T10:00:00.123Z", "level": "INFO",
  #    "message": "note created", "request_id": "a1b2c3d4", ...}
  #
  # The json filter parses the "message" field and promotes all JSON keys
  # to top-level fields in the event document.
  json {
    source => "message"

    # If JSON parsing fails (e.g., a non-JSON startup message from Flask),
    # the event still passes through — the raw message is preserved.
    # A tag "_jsonparsefailure" is added so you can filter these in Kibana.
    skip_on_invalid_json => true
  }

  # ── Step 2: Rename fields for consistency ─────────────────────────────────
  # Logstash uses @timestamp as the canonical event time field.
  # Our app emits "timestamp" — rename it so Kibana's time filter works.
  #
  # Elasticsearch Mapping Impact:
  #   @timestamp is a reserved date field. If we leave "timestamp" as a
  #   separate string field, Kibana won't recognize it for time-based queries.
  if [timestamp] {
    mutate {
      rename => { "timestamp" => "@timestamp" }
    }
  }

  # ── Step 3: Parse the @timestamp string into a date object ────────────────
  # Elasticsearch expects @timestamp as an ISO-8601 date, not a string.
  # The date filter parses the string and sets it as the official event time.
  if [@timestamp] {
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"

      # If date parsing fails, keep Logstash's ingestion time rather than
      # failing the entire event. Tag so you can spot these in Kibana.
      tag_on_failure => ["_dateparsefailure"]
    }
  }

  # ── Step 4: Normalize the log level field name ─────────────────────────────
  # python-json-logger emits "levelname" (Python logging convention).
  # ECS (Elastic Common Schema) convention is "log.level".
  # Renaming keeps our index consistent with ECS-compatible dashboards.
  if [levelname] {
    mutate {
      rename => { "levelname" => "log.level" }
    }
  }

  # ── Step 5: Copy the log level to a top-level "level" for easy querying ───
  # Some dashboards and KQL queries use "level" not "log.level".
  # Keep both so queries work either way.
  if [log.level] and ![level] {
    mutate {
      add_field => { "level" => "%{[log.level]}" }
    }
  }

  # ── Step 6: Tag the source app ────────────────────────────────────────────
  # Add a field to identify which application produced this log.
  # Useful when multiple apps share the same Elasticsearch cluster —
  # you can filter by app_name in Kibana.
  mutate {
    add_field => { "app_name" => "notes-app" }
  }

  # ── Step 7: Remove noisy Filebeat/Logstash internal fields ────────────────
  # Beats adds internal metadata fields we don't need in Elasticsearch.
  # Removing them keeps documents lean and reduces index storage.
  mutate {
    remove_field => [
      "agent",        # Filebeat agent info (version, hostname)
      "ecs",          # ECS version field
      "input",        # Filebeat input type
      "log",          # Filebeat internal log path (not our app's log.level)
      "tags"          # Filebeat processing tags
    ]
  }

}

# ── OUTPUT ────────────────────────────────────────────────────────────────────
output {
  elasticsearch {
    # Connect to the external ELK stack's Elasticsearch container.
    # "es01" is the container name — Docker DNS resolves it because
    # Logstash is on the "elastic" external network (see docker-compose.yml).
    hosts => ["https://es01:9200"]

    # Authenticate with the Elasticsearch superuser account.
    # The password is injected from the .env file via docker-compose.yml:
    #   environment: - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    # Logstash then reads it from the container environment.
    #
    # IMPORTANT: Use alphanumeric passwords only.
    # Special characters (*, +, =) break Logstash's ${ENV_VAR} expansion.
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"

    # TLS/HTTPS settings ────────────────────────────────────────────────────
    # Elasticsearch runs with TLS enabled. We must configure SSL here.
    ssl_enabled => true

    # Path to the CA certificate inside the Logstash container.
    # Mounted via docker-compose.yml from ./elk/certs/http_ca.crt.
    # Obtain it by running:
    #   docker cp es01:/usr/share/elasticsearch/config/certs/http_ca.crt elk/certs/http_ca.crt
    ssl_certificate_authorities => ["/usr/share/logstash/certs/http_ca.crt"]

    # Disable hostname verification.
    # The cert is issued to the container ID (e.g., "3f3e07243b2c"),
    # not the hostname "es01", so strict verification would fail.
    # The cert is still used to verify the CA — traffic remains encrypted.
    ssl_verification_mode => "none"

    # Daily index rotation — one index per day.
    # Pattern: notes-app-2026.03.28, notes-app-2026.03.29, etc.
    #
    # Benefits:
    #   - Easy cleanup: delete old indices by date
    #   - Faster queries: Kibana queries only the relevant date range
    #   - Manageable shard sizes
    index => "notes-app-%{+YYYY.MM.dd}"
  }

  # ── Debug output (optional) ──────────────────────────────────────────────
  # Uncomment to print processed events to Logstash stdout.
  # Useful for troubleshooting — run: docker logs notes-logstash -f
  # stdout {
  #   codec => rubydebug
  # }
}
