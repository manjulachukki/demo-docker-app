input {
  # Receive log events from Filebeat on port 5044
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON log lines emitted by the Flask app
  if [message] =~ /^\s*\{/ {
    json {
      source  => "message"
      target  => "log"
    }
    # Promote common fields to the top level for easier querying in Kibana
    mutate {
      rename => {
        "[log][levelname]"   => "level"
        "[log][message]"     => "log_message"
        "[log][name]"        => "logger"
        "[log][asctime]"     => "timestamp"
        "[log][endpoint]"    => "endpoint"
        "[log][method]"      => "http_method"
        "[log][remote_addr]" => "client_ip"
        "[log][status]"      => "response_status"
      }
    }
  }

  # Add a fixed service tag so you can filter just this app in Kibana
  mutate {
    add_field => { "service" => "flask-demo-app" }
  }

  # Drop internal Filebeat heartbeat events that have no real log message
  if [type] == "log" and ![message] {
    drop {}
  }
}

output {
  # Forward processed logs to the external Elasticsearch (es01)
  # Uses HTTPS with the CA cert mounted into this container
  elasticsearch {
    hosts    => ["https://es01:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled                  => true
    ssl_certificate_authorities  => ["/usr/share/logstash/certs/http_ca.crt"]
    ssl_verification_mode        => "none"
    index    => "flask-app-%{+YYYY.MM.dd}"
  }
}
