input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON log lines emitted by the Flask app
  if [message] =~ /^\s*\{/ {
    json {
      source  => "message"
      target  => "log"
    }
    # Promote common fields to the top level for easier querying in Kibana
    mutate {
      rename => {
        "[log][levelname]"   => "level"
        "[log][message]"     => "log_message"
        "[log][name]"        => "logger"
        "[log][asctime]"     => "timestamp"
        "[log][endpoint]"    => "endpoint"
        "[log][method]"      => "http_method"
        "[log][remote_addr]" => "client_ip"
        "[log][status]"      => "response_status"
      }
    }
  }

  # Add a fixed service tag for filtering in Kibana
  mutate {
    add_field => { "service" => "flask-demo-app" }
  }

  # Drop noisy Filebeat internal events
  if [type] == "log" and ![message] {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "flask-app-%{+YYYY.MM.dd}"
  }
}
