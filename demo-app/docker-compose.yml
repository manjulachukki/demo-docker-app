services:

  # ── Flask Application ──────────────────────────────────────────────────────
  # This is our demo web app. It emits structured JSON logs to stdout.
  # Filebeat picks up those logs automatically via the Docker labels below.
  app:
    build: .
    ports:
      - "5000:5000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # These labels tell Filebeat: "yes, collect logs from this container"
      - "co.elastic.logs/enabled=true"
      - "co.elastic.logs/json.keys_under_root=true"
      - "co.elastic.logs/json.overwrite_keys=true"
    networks:
      - elk

  # ── Logstash ───────────────────────────────────────────────────────────────
  # Logstash receives logs from Filebeat, parses/enriches them,
  # then forwards them to the external Elasticsearch (es01).
  # It needs to be on BOTH networks:
  #   - elk    → to receive from Filebeat on port 5044
  #   - elastic → to send to es01 on port 9200
  logstash:
    image: docker.elastic.co/logstash/logstash:9.3.2
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      # CA certificate so Logstash can trust the HTTPS connection to es01
      - ./elk/certs/http_ca.crt:/usr/share/logstash/certs/http_ca.crt:ro
    ports:
      - "5044:5044"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.monitoring.enabled=false
      # Pass the elastic password into the container so logstash.conf can use ${ELASTIC_PASSWORD}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    networks:
      - elk      # internal: receives logs from Filebeat
      - elastic  # external: forwards logs to es01

  # ── Filebeat ───────────────────────────────────────────────────────────────
  # Filebeat watches Docker container logs on this host and ships them
  # to Logstash. It only collects from containers with the
  # co.elastic.logs/enabled=true label (set on the app service above).
  filebeat:
    image: docker.elastic.co/beats/filebeat:9.3.2
    user: root
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # Access to Docker container log files on the host
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Access to Docker socket to discover container metadata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    networks:
      - elk

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  elk:
    # Internal network: app, filebeat, and logstash communicate here
    driver: bridge

  elastic:
    # External network: already created by the ELK stack setup (es01, kib01 live here)
    # We join it so Logstash can reach es01 by name
    external: true
